    <script>
      (function () {
        const { createApp, ref, computed, reactive, watch, nextTick, onMounted, onUnmounted } = Vue;
        const { createRouter, createWebHashHistory, useRouter, useRoute } = VueRouter;

        const riskKeywords = [
          '胸痛',
          '心口疼',
          '胸口痛',
          '半身麻木',
          '半边麻木',
          '肢体麻木',
          '突然说不出话',
          '口眼歪斜',
          '剧烈头痛',
          '喘不上气',
          '呼吸困难',
          '意识不清',
          '大量出血',
        ];

        function hasRiskKeyword(text) {
          if (!text || typeof text !== 'string') return false;
          const t = text.trim();
          return riskKeywords.some(function (k) {
            return t.indexOf(k) !== -1;
          });
        }

        function isProbablyImageFile(f) {
          if (!f || !f.size || f.size > 45 * 1024 * 1024) return false;
          var t = (f.type || '').toLowerCase();
          if (t.indexOf('video/') === 0) return false;
          if (t.indexOf('image/') === 0) return true;
          if (t === 'application/octet-stream' || t === '') return true;
          var n = (f.name || '').toLowerCase();
          if (/\.(heic|heif|jpg|jpeg|png|gif|webp|bmp)$/i.test(n)) return true;
          return true;
        }

        const scenarios = {
          default: {
            meaning:
              '您描述的情况更像是一般性的身体不适或生活习惯相关信号，需要结合更多细节判断。',
            cautions: [
              '若症状突然加重、持续不缓解，请不要只靠网络咨询。',
              '有慢性病用药者，勿自行停药或加量。',
            ],
            nextSteps: [
              '把症状出现时间、频率、是否用药记下来，方便问诊时说清楚。',
              '可先预约社区医生或家庭医生做初步评估。',
            ],
          },
          report: {
            meaning:
              '体检报告里很多项目是“参考范围”，略高或略低不一定代表生病，要看整体和趋势。',
            cautions: [
              '不要只看单个箭头就自行对号入座。',
              '若报告有“建议复查/专科就诊”，应优先按报告提示处理。',
            ],
            nextSteps: [
              '把异常项名称和数值拍照保存，就诊时带给医生看。',
              '可在下次体检前保持规律作息，避免熬夜后立刻抽血。',
            ],
          },
          fatigue: {
            meaning:
              '长期觉得累，常见原因包括睡眠差、贫血、甲状腺问题、情绪压力或慢性病未控制好。',
            cautions: [
              '若伴有明显消瘦、发热、夜间盗汗等，应尽早就医排查。',
              '不要长期靠提神饮料硬扛，可能掩盖真实原因。',
            ],
            nextSteps: [
              '连续记录一周睡眠时长与白天精力，观察是否与劳累相关。',
              '预约内科或全科，可做血常规、甲功等基础检查（以医生建议为准）。',
            ],
          },
          sleep: {
            meaning: '睡不好往往是“身体+心理+环境”一起作用，需要慢慢调整而不是一次解决。',

                var end = chatEndRef.value;
                if (end && end.scrollIntoView) {

                    end.scrollIntoView({ block: 'end', inline: 'nearest' });
                  } catch (e1) {
                    try {
                      end.scrollIntoView(false);
                    } catch (e2) {}
                  }
                }
                var doc = document.documentElement;
                var h = Math.max(doc.scrollHeight, doc.body.scrollHeight);
                window.scrollTo(0, h);

              nextTick(function () {
                run();
                requestAnimationFrame(function () {
                  run();
                  requestAnimationFrame(function () {
                    run();
                    window.setTimeout(run, 0);
                    window.setTimeout(run, 80);
                    window.setTimeout(run, 200);
                    window.setTimeout(run, 450);

              function done(url) {
                if (!url) {

                  return;
                }
                if (entryFrom.value === 'quick' && quickDemoAtPhotoStep()) {
                  handleQuickDemoPhotoUpload(url);

                finishPhotoWithScenario(url, '');

              try {

                var reader = new FileReader();
                reader.onload = function () {
                  done(reader.result);
                };
                reader.onerror = function () {
                  window.alert('图片读取失败，请重试。');
                };
                reader.readAsDataURL(f);
              }
            }

        const SONGHE_ONBOARDING_KEY = 'songhe_onboarding_v1';

        const App = {
          setup() {
            const route = useRoute();
            const router = useRouter();
            const onboardingOpen = ref(false);
            const obStep = ref(0);
            const obToast = ref('');
            const micPressed = ref(false);
            var obToastTimer = null;
            var obMicHoldTimer = null;
            var obMicCooldown = false;

            var OB_TOAST_MS = 1000;

            function showObToast(msg) {
              if (obToastTimer) clearTimeout(obToastTimer);
              obToastTimer = null;
              obToast.value = '';
              nextTick(function () {
                obToast.value = msg;
                obToastTimer = setTimeout(function () {
                  obToast.value = '';
                  obToastTimer = null;
                }, OB_TOAST_MS);
              });
            }

            function setOnboardingAriaAndScroll(open) {
              var root = document.getElementById('onboarding-root');
              if (root) root.setAttribute('aria-hidden', open ? 'false' : 'true');
              try {
                document.documentElement.classList.toggle('poster-scroll-lock', !!open);
                document.body.classList.toggle('poster-scroll-lock', !!open);
              } catch (e) {}
            }

            function onObBackdrop() {
              showObToast('别担心，这里是练习区，怎么点都不怕');
            }

            function onObCardEmpty() {
              showObToast('别担心，这里是练习区，怎么点都不怕');
            }

            function doCalibrate() {
              if (obStep.value !== 0) return;
              showObToast('语音已适配，声音很清晰哦 ✓');
              setTimeout(function () {
                obStep.value = 1;
              }, 1400);
            }

            function obMicCompleteStep() {
              if (obMicCooldown) return;
              if (obStep.value === 1) {
                obMicCooldown = true;
                showObToast('很棒，我们已经认识啦');
                setTimeout(function () {
                  obStep.value = 2;
                  obMicCooldown = false;
                }, 1500);
              } else if (obStep.value === 2) {
                obMicCooldown = true;
                showObToast('太厉害啦，这样说就可以咨询啦');
                setTimeout(function () {
                  obStep.value = 3;
                  obMicCooldown = false;
                }, 1500);
              }
            }

            function obMicPointerDown() {
              if (obStep.value !== 1 && obStep.value !== 2) return;
              micPressed.value = true;
              if (obMicHoldTimer) clearTimeout(obMicHoldTimer);
              obMicHoldTimer = setTimeout(function () {
                obMicHoldTimer = null;
                micPressed.value = false;
                obMicCompleteStep();
              }, 420);
            }

            function obMicPointerUp() {
              micPressed.value = false;
              if (obMicHoldTimer) {
                clearTimeout(obMicHoldTimer);
                obMicHoldTimer = null;
              }
            }

            function obMicTap() {
              if (obStep.value !== 1 && obStep.value !== 2) return;
              obMicCompleteStep();
            }

            function completeTask3() {
              if (obStep.value !== 3) return;
              showObToast('安全提示已确认，更放心啦');
              setTimeout(function () {
                obStep.value = 4;
              }, 1400);
            }

            function finishOnboarding() {
              try {
                localStorage.setItem(SONGHE_ONBOARDING_KEY, '1');
              } catch (e) {}
              onboardingOpen.value = false;
              setOnboardingAriaAndScroll(false);
              chatStore.reset();
              router.push({ path: '/chat', query: { from: 'quick' } });
            }

            function skipOnboarding() {
              try {
                localStorage.setItem(SONGHE_ONBOARDING_KEY, '1');
              } catch (e) {}
              onboardingOpen.value = false;
              setOnboardingAriaAndScroll(false);
              chatStore.reset();
              router.push({ path: '/chat', query: { from: 'quick' } });
            }

            onMounted(function () {
              setOnboardingAriaAndScroll(false);
              window.songheReopenOnboarding = function () {
                obStep.value = 0;
                obToast.value = '';
                onboardingOpen.value = true;
                setOnboardingAriaAndScroll(true);
              };
            });

            onUnmounted(function () {
              setOnboardingAriaAndScroll(false);
              try {
                delete window.songheReopenOnboarding;
              } catch (e) {
                window.songheReopenOnboarding = undefined;
              }
            });

            watch(onboardingOpen, function (v) {
              setOnboardingAriaAndScroll(!!v);
            });

            return {
              route,
              onboardingOpen,
              obStep,
              obToast,
              micPressed,
              onObBackdrop,
              onObCardEmpty,
              doCalibrate,
              obMicPointerDown,
              obMicPointerUp,
              obMicTap,
              completeTask3,
              finishOnboarding,
              skipOnboarding,
            };

            '<div v-if="onboardingOpen" class="onboarding-shell" @click.self="onObBackdrop">' +
            '<div class="onboarding-card" @click.self="onObCardEmpty">' +
            '<template v-if="obStep === 0">' +
            '<p class="onboarding-title">别着急，慢慢说，我们一步一步来</p>' +
            '<p class="onboarding-tagline">先玩再问，零负担入门</p>' +
            '<p class="onboarding-p">说一句话就能开始。这里是<strong>练习区</strong>，没有真实问诊，怎么点都不怕。</p>' +
            '<div class="onboarding-box">' +
            '<p class="onboarding-box-warn"><strong>能帮您：</strong>聊聊不舒服、看懂检查单怎么说、日常保健小知识。<br /><strong>不能代替：</strong>医生当面看病、开药、急救。</p>' +
            '</div>' +
            '<p class="onboarding-p" style="font-size:0.98rem;color:#57534e">胸口疼、喘不上气、突然说不出话等紧急情况，要快找医生或打 120，并告诉家人。</p>' +
            '<div class="onboarding-mic-wrap">' +
            '<p class="onboarding-arrow-hint" aria-hidden="true">↓</p>' +
            '<button type="button" class="onboarding-mic-btn" @click="doCalibrate">' +
            '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="23"/></svg>' +
            '点这里试着说一句</button>' +
            '</div>' +
            '<p class="onboarding-p" style="font-size:0.95rem;margin-top:0.35rem">跟着念：<strong>你好，松鹤</strong></p>' +
            '<p class="onboarding-p" style="font-size:0.88rem;color:#78716e">旁边空白处点一下也没关系，都是练习。</p>' +
            '</template>' +
            '<template v-else-if="obStep === 1">' +
            '<p class="onboarding-progress">第 1 步 · 共 3 步</p>' +
            '<p class="onboarding-title">先打个招呼吧</p>' +
            '<p class="onboarding-p">试着说一句：<strong>你好</strong></p>' +
            '<div class="onboarding-mic-wrap">' +
            '<p class="onboarding-arrow-hint" aria-hidden="true">↓</p>' +
            '<button type="button" class="onboarding-mic-btn" :class="{ \'ob-mic-down\': micPressed }" @pointerdown="obMicPointerDown" @pointerup="obMicPointerUp" @pointerleave="obMicPointerUp" @click="obMicTap">' +
            '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="23"/></svg>' +
            '按住说问题</button>' +
            '</div>' +
            '<p class="onboarding-p" style="font-size:0.9rem;color:#78716e">轻点一下也可以完成练习。</p>' +
            '</template>' +
            '<template v-else-if="obStep === 2">' +
            '<p class="onboarding-progress">第 2 步 · 共 3 步</p>' +
            '<p class="onboarding-title">假装说一下哪里不舒服</p>' +
            '<p class="onboarding-p">可以跟着说：<strong>最近有点累</strong></p>' +
            '<div class="onboarding-mic-wrap">' +
            '<p class="onboarding-arrow-hint" aria-hidden="true">↓</p>' +
            '<button type="button" class="onboarding-mic-btn" :class="{ \'ob-mic-down\': micPressed }" @pointerdown="obMicPointerDown" @pointerup="obMicPointerUp" @pointerleave="obMicPointerUp" @click="obMicTap">' +
            '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="23"/></svg>' +
            '按住说问题</button>' +
            '</div>' +
            '<p class="onboarding-p" style="font-size:0.9rem;color:#78716e">这是练习，真用时就这样说一句就行。</p>' +
            '</template>' +
            '<template v-else-if="obStep === 3">' +
            '<p class="onboarding-progress">第 3 步 · 共 3 步</p>' +
            '<p class="onboarding-title">最后确认一下安全提示</p>' +
            '<div class="onboarding-box">' +
            '<p class="onboarding-box-warn">急病急痛不要只靠手机问，要尽快找医生或联系家人。</p>' +
            '</div>' +
            '<button type="button" class="onboarding-btn-secondary" @click="completeTask3">我知道紧急情况要找医生或家人</button>' +
            '</template>' +
            '<template v-else-if="obStep === 4">' +
            '<div class="onboarding-grad-wrap">' +
            '<div class="onboarding-grad-badge" aria-hidden="true">🎓</div>' +
            '<p class="onboarding-title">恭喜毕业，开始健康之旅</p>' +
            '<p class="onboarding-p">您已经会打招呼、会描述不舒服，也记住了安全提醒。</p>' +
            '<button type="button" class="onboarding-btn-start" @click="finishOnboarding">我准备好了，开始提问</button>' +
            '</div>' +
            '</template>' +
            '<div v-if="obToast" class="onboarding-inline-feedback" role="status">{{ obToast }}</div>' +
            '<button v-if="obStep < 4" type="button" class="onboarding-skip" @click="skipOnboarding">暂时跳过练习</button>' +
            '</div>' +
            '</div>' +
            '</teleport>' +
            '<div class="flex h-[100dvh] max-h-[100dvh] w-full justify-center overflow-hidden">' +
            '<div class="flex h-full max-h-full w-full max-w-mobile flex-col overflow-hidden bg-songhe-surface shadow-xl shadow-slate-300/50 sm:my-3 sm:max-h-[calc(100dvh-1.5rem)] sm:rounded-[2rem] sm:ring-[10px] sm:ring-slate-800/90" ' +
            ':style="{ paddingTop: \'max(0px, env(safe-area-inset-top, 0px))\' }">' +
            '<div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">' +
            '<router-view v-slot="{ Component }">' +
            '<transition name="page" mode="out-in">' +
            '<component :is="Component" :key="route.fullPath" />' +
            '</transition></router-view></div></div></div>',
        };

        const router = createRouter({
          history: createWebHashHistory(),
          routes: [
            { path: '/', component: Home, meta: { title: '松鹤·智语' } },
            { path: '/chat', component: Chat, meta: { title: '松鹤·智语 · 咨询' } },
          ],
        });

        router.afterEach(function (to) {
          document.title = (to.meta && to.meta.title) ? to.meta.title : '松鹤·智语';
        });

        createApp(App).use(router).mount('#app');
      })();
    </script>
  </body>
</html>
